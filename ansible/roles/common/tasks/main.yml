---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: Install base packages
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - unzip
      - htop
      - logrotate
    state: present
  become: yes

- name: Set timezone
  timezone:
    name: America/New_York
  become: yes
