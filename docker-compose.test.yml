# Temporary test compose — runs on alternate ports alongside the old deployment.
# Once verified, stop the old containers and switch to docker-compose.yml (real ports).
name: sensoriot-test

services:

  rest_server:
    image: sensoriot-rest_server:test
    build: ./appbackend
    restart: "no"
    ports:
      - "8080:80"
      - "8443:443"
    env_file:
      - ./.env
    environment:
      - MONGODB_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - anomaly_models_test:/models
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - backend

  broker:
    image: sensoriot-broker:test
    build: ./broker
    restart: "no"
    ports:
      - "1884:1883"
    env_file:
      - ./.env
    environment:
      - MONGODB_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./secrets/firebase_service_account.json:/firebase_service_account.json:ro
    networks:
      - backend

volumes:
  anomaly_models_test:

networks:
  backend:
    driver: bridge
