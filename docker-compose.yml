name: sensoriot

services:

  rest_server:
    image: sensoriot-rest_server
    build: ./appbackend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - ./.env
    environment:
      - MONGODB_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - anomaly_models:/models
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - backend

  mcp_server:
    image: sensoriot-mcp_server
    build: ./mcp_server
    restart: unless-stopped
    environment:
      - API_BASE_URL=http://rest_server:80
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8080
    networks:
      - backend
    depends_on:
      - rest_server

  broker:
    image: sensoriot-broker
    build: ./broker
    restart: unless-stopped
    ports:
      - "1883:1883"
    env_file:
      - ./.env
    environment:
      - MONGODB_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./secrets/firebase_service_account.json:/firebase_service_account.json:ro
    networks:
      - backend

volumes:
  anomaly_models:

networks:
  backend:
    driver: bridge
