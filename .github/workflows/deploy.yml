name: Deploy

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # Only deploy if tests would pass (same checks run on the PR)
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST << 'DEPLOY'
            set -e
            cd /opt/sensoriot/repo

            echo "==> Pulling latest code..."
            git fetch origin
            git reset --hard origin/master

            echo "==> Building images..."
            cd /opt/sensoriot
            docker compose build

            echo "==> Building mcp_server image..."
            docker build -t sensoriot-mcp_server /opt/sensoriot/repo/mcp_server

            echo "==> Updating docker-compose with mcp_server service..."
            python3 - << 'PYEOF'
import yaml
path = '/opt/sensoriot/docker-compose.yml'
with open(path) as f:
    cfg = yaml.safe_load(f)
cfg.setdefault('services', {})['mcp_server'] = {
    'image': 'sensoriot-mcp_server',
    'restart': 'unless-stopped',
    'environment': [
        'API_BASE_URL=http://rest_server:80',
        'MCP_HOST=0.0.0.0',
        'MCP_PORT=8080',
    ],
    'networks': ['backend'],
    'depends_on': ['rest_server'],
}
with open(path, 'w') as f:
    yaml.dump(cfg, f, default_flow_style=False)
print('docker-compose.yml updated')
PYEOF

            echo "==> Restarting services..."
            docker compose down
            docker compose up -d

            echo "==> Waiting for services..."
            sleep 5

            echo "==> Health check..."
            docker exec sensoriot-rest_server-1 curl -sf http://localhost:5050/ > /dev/null
            echo "REST server: OK"

            docker exec sensoriot-broker-1 sh -c 'cat /broker.log 2>/dev/null | tail -1'
            echo "Broker: OK"

            echo "==> Deploy complete!"
            docker compose ps
          DEPLOY
